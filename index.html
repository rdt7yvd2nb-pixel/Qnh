<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Message</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap');

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  color: white;
  background: radial-gradient(ellipse at bottom, #3a0ca3 0%, #000000 100%);
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.container {
  text-align: center;
  max-width: 750px;
  margin: auto;
  margin-top: 12vh;
  padding: 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
  border-radius: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
}

input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 15px;
}

button {
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  background: #ff4da6;
  color: white;
  margin-left: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.hidden {
  display: none;
}

#error {
  color: #ff4da6;
  margin-top: 10px;
}

#typedText {
  white-space: pre-line;
  line-height: 1.8;
  margin-top: 20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container" id="login">
  <h1>Private Message</h1>
  <p>Enter password to unlock</p>
  <input type="password" id="passwordInput">
  <button onclick="checkPassword()">Enter</button>
  <p id="error"></p>
</div>

<div class="container hidden" id="message">
  <h1>For You</h1>
  <div id="typedText"></div>
</div>

<script>
const correctPassword = "0203";

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  if (input === correctPassword) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("message").classList.remove("hidden");
    typeWriter();
  } else {
    document.getElementById("error").innerText = "Wrong password.";
  }
}

// ===== FULL LETTER (GIỮ NGUYÊN BẢN DÀI) =====
const text = `I’ve been thinking a lot since today, and I feel like I need to say this properly instead of keeping it to myself.

Today was really special to me. After everything we shared, I know things between us aren’t simple anymore. There are certain parts of myself I only give when I truly trust someone and when my feelings are real. What happened wasn’t light to me, and it wasn’t casual.

When I chose to open up to you and be with you in that way, I did it with trust, with vulnerability, and with seriousness. It meant something. And because it meant something, I can’t just move forward pretending it was just another moment.

I don’t ever want to look back and feel like I was careless with my feelings. I need to know that what we shared won’t be taken lightly, and that it won’t leave me questioning what I mean to you.

I’m not saying this to pressure you. I’m saying it because I value myself, and I value what we have. I just hope that we both understand the weight of what happened, and that it’s something we treat with the respect it deserves.`;

// ===== Typing Effect =====
let i = 0;
function typeWriter() {
  if (i < text.length) {
    document.getElementById("typedText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 28);
  }
}

// ===== Galaxy + Floating Hearts =====
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let hearts = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 2,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3
  });
}

for (let i = 0; i < 20; i++) {
  hearts.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 10 + Math.random() * 10,
    speed: 0.3 + Math.random() * 0.5
  });
}

function drawHeart(x, y, size) {
  ctx.fillStyle = "rgba(255,105,180,0.8)";
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - size/2, y - size/2, x - size, y + size/3, x, y + size);
  ctx.bezierCurveTo(x + size, y + size/3, x + size/2, y - size/2, x, y);
  ctx.fill();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  stars.forEach(s => {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.fill();
    s.x += s.dx;
    s.y += s.dy;
    if (s.x < 0 || s.x > canvas.width) s.dx *= -1;
    if (s.y < 0 || s.y > canvas.height) s.dy *= -1;
  });

  hearts.forEach(h => {
    drawHeart(h.x, h.y, h.size);
    h.y -= h.speed;
    if (h.y < -20) {
      h.y = canvas.height + 20;
      h.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
